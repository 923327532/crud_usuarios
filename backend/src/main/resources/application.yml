spring:
  application:
    name: crud-usuarios

  datasource:
    url: jdbc:postgresql://localhost:5432/crud_usuarios
    username: postgres
    password: Lopez2003

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true   # 👈 ESTA ES LA CLAVE
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.tecsup.crudusuarios: DEBUG
    org.springframework.web: DEBUG