spring:
  application:
    name: crud-usuarios
  datasource:
    url: jdbc:postgresql://localhost:5432/crud_usuarios
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.tecsup.crudusuarios: DEBUG
    org.springframework.web: DEBUG
