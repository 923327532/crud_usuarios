spring:
  application:
    name: crud-usuarios

  datasource:
    url: jdbc:postgresql://localhost:5432/crud_usuarios
    username: postgres
    password: Lopez2003

  jpa:
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: never  # ✅ Cambia a NEVER - ya tienes datos

server:
  port: 8081
  servlet:
    context-path: /

logging:
  level:
    com.tecsup.crudusuarios: DEBUG
    org.springframework.web: DEBUG