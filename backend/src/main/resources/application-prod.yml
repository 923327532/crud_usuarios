spring:
  application:
    name: crud-usuarios
  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never  # ← AGREGAR ESTO

server:
  port: ${PORT:8080}

logging:
  level:
    com.tecsup.crudusuarios: INFO
    org.springframework.web: WARN